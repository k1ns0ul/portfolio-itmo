listen: 0.0.0.0:8080
strategy: round_robin
health_check:
  interval: 5s
  timeout: 2s
  type: tcp
  threshold: 3
metrics:
  enabled: true
  port: 9100
backends:
  - address: 127.0.0.1:3001
    weight: 3
  - address: 127.0.0.1:3002
    weight: 1
  - address: 127.0.0.1:3003
    weight: 1
drain_timeout: 30s
