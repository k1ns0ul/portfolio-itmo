services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mpc
      POSTGRES_PASSWORD: mpc
      POSTGRES_DB: mpc
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpc"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  coordinator:
    build:
      context: .
      args:
        TARGET: coordinator
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      POSTGRES_DSN: "postgres://mpc:mpc@postgres:5432/mpc?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      K8S_ENABLED: "false"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"
      - "9090:9090"

  node-0:
    build:
      context: .
      args:
        TARGET: node
    depends_on:
      - coordinator
    environment:
      NODE_ID: "0"
      SESSION_ID: "demo"
      COORDINATOR_ADDR: "coordinator:9090"
      LISTEN_ADDR: ":9091"
      ADVERTISE_ADDR: "node-0:9091"
      PEER_ADDRS: "0=node-0:9091,1=node-1:9091,2=node-2:9091"
      GATHER_TIMEOUT: "30s"

  node-1:
    build:
      context: .
      args:
        TARGET: node
    depends_on:
      - coordinator
    environment:
      NODE_ID: "1"
      SESSION_ID: "demo"
      COORDINATOR_ADDR: "coordinator:9090"
      LISTEN_ADDR: ":9091"
      ADVERTISE_ADDR: "node-1:9091"
      PEER_ADDRS: "0=node-0:9091,1=node-1:9091,2=node-2:9091"
      GATHER_TIMEOUT: "30s"

  node-2:
    build:
      context: .
      args:
        TARGET: node
    depends_on:
      - coordinator
    environment:
      NODE_ID: "2"
      SESSION_ID: "demo"
      COORDINATOR_ADDR: "coordinator:9090"
      LISTEN_ADDR: ":9091"
      ADVERTISE_ADDR: "node-2:9091"
      PEER_ADDRS: "0=node-0:9091,1=node-1:9091,2=node-2:9091"
      GATHER_TIMEOUT: "30s"
