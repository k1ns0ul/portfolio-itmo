apiVersion: v1
kind: ServiceAccount
metadata:
  name: mpc-coordinator
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mpc-coordinator
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "list", "watch", "get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mpc-coordinator
  namespace: {{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: mpc-coordinator
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: mpc-coordinator
  apiGroup: rbac.authorization.k8s.io
