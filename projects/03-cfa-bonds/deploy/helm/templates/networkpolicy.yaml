apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cfa-settlement-isolation
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.settlement.name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cfa-kafka
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cfa-api-ingress
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.api.name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.api.port }}
