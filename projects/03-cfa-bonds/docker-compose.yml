services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cfa
      POSTGRES_PASSWORD: cfa
      POSTGRES_DB: cfa
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfa"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      args:
        TARGET: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      API_ADDR: ":8080"
      DB_DSN: "postgres://cfa:cfa@postgres:5432/cfa?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      JWT_SECRET: "local-dev-secret"
    ports:
      - "8080:8080"

  settlement-worker:
    build:
      context: .
      args:
        TARGET: settlement-worker
    depends_on:
      - api
    environment:
      DB_DSN: "postgres://cfa:cfa@postgres:5432/cfa?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_GROUP: "cfa-settlement"

  coupon-worker:
    build:
      context: .
      args:
        TARGET: coupon-worker
    profiles: ["tools"]
    depends_on:
      - postgres
    environment:
      DB_DSN: "postgres://cfa:cfa@postgres:5432/cfa?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      RUN_ONCE: "true"

  maturity-worker:
    build:
      context: .
      args:
        TARGET: maturity-worker
    profiles: ["tools"]
    depends_on:
      - postgres
    environment:
      DB_DSN: "postgres://cfa:cfa@postgres:5432/cfa?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      RUN_ONCE: "true"

  metrics-exporter:
    build:
      context: .
      args:
        TARGET: metrics-exporter
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      METRICS_ADDR: ":9090"
      DB_DSN: "postgres://cfa:cfa@postgres:5432/cfa?sslmode=disable"
    ports:
      - "9090:9090"

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - metrics-exporter

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboard.json:/var/lib/grafana/dashboards/cfa.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
