services:
  kv-node-1:
    build: .
    ports:
      - "8081:8080"
      - "9101:9100"
    command:
      - --id=node1
      - --addr=0.0.0.0:8080
      - --raft-addr=kv-node-1:7000
      - --grpc-addr=0.0.0.0:7100
      - --data-dir=/data
      - --bootstrap
      - --peers=kv-node-1:7000,kv-node-2:7000,kv-node-3:7000
    volumes:
      - kv-data-1:/data

  kv-node-2:
    build: .
    ports:
      - "8082:8080"
      - "9102:9100"
    command:
      - --id=node2
      - --addr=0.0.0.0:8080
      - --raft-addr=kv-node-2:7000
      - --grpc-addr=0.0.0.0:7100
      - --data-dir=/data
      - --peers=kv-node-1:7000,kv-node-2:7000,kv-node-3:7000
    volumes:
      - kv-data-2:/data

  kv-node-3:
    build: .
    ports:
      - "8083:8080"
      - "9103:9100"
    command:
      - --id=node3
      - --addr=0.0.0.0:8080
      - --raft-addr=kv-node-3:7000
      - --grpc-addr=0.0.0.0:7100
      - --data-dir=/data
      - --peers=kv-node-1:7000,kv-node-2:7000,kv-node-3:7000
    volumes:
      - kv-data-3:/data

volumes:
  kv-data-1:
  kv-data-2:
  kv-data-3:
